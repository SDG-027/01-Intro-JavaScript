<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- JS-Datei im HTML einbinden -->
    <!-- Moderner Standard: Browser lädt script.js im Hintergrund herunter -->
    <!-- defer verzögert die Ausführung, bis HTML komplett ausgelesen ist -->
    <script src="script.js" defer></script>
    <title>JS Intro</title>
  </head>

  <body>

    <h1>Hallo, Welt!</h1>


    <!-- script Tags können auch im body stehen, dann meist ganz am Ende, um sicher zu gehen, dass alle Elemente existieren -->
    <!-- <script>

      console.log(42 + 13)

      document.querySelector("h1").textContent = "Willkommen zu JavaScript!"

    </script> -->


  </body>

</html>
